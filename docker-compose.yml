services:
  db:
    image: postgres:16
    container_name: eventosvivos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventosvivos
    ports:
      - "5432:5432"
    volumes:
      - eventosvivos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventosvivos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eventosvivos-pgdata:
