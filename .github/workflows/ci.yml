name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EventReservations.slnx

      - name: Build
        run: dotnet build EventReservations.slnx -c Release --no-restore

      - name: Test
        # Los tests de integración usan Testcontainers; los runners de GitHub
        # incluyen Docker, así que PostgreSQL efímero funciona en CI.
        run: dotnet test EventReservations.slnx -c Release --no-build --verbosity normal
